<!DOCTYPE html>

<head>

  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <!-- Apply saved colour theme before first paint to avoid a flash -->
  <script>(function(){try{if(localStorage.getItem('da-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');if(sessionStorage.getItem('da-menu-wipe')){sessionStorage.removeItem('da-menu-wipe');document.documentElement.classList.add('menu-wipe-in');}}catch(e){}})();</script>
  <script defer src="/js/theme.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="https://use.typekit.net/gfl8gha.css" />
  <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.23/dist/lenis.css">

  <!-- SEO — thin placeholder page; keep out of the index and sitemap. -->
  <meta name="robots" content="noindex, follow" />
  <meta name="description" content="Our Work and Expertise showcase is coming soon. In the meantime, get in touch with Doheny Atelier to discuss building or reviving your brand." />
  <link rel="canonical" href="https://dohenyatelier.com/comingsoon/" />

    <a href="/about/" class="nav-link">About</a>

  <footer class="footer" id="footer">

  <!-- SCROLL-TO-TOP: progress-indicating donut (graphite fill = scroll progress).
       Pure-CSS conic fill; js/backtotop.js reveals it + inverts over dark sections. -->
  <a href="#cs-top" class="cs-totop" aria-label="Back to top">
    <span>Back to top</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 19V5" />
      <path d="M5 12l7-7 7 7" />
    </svg>
  </a>

  <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
  <script>window.lenis = new Lenis({ autoRaf: true, autoToggle: true, anchors: true, allowNestedScroll: true, naiveDimensions: true, stopInertiaOnNavigate: true })</script>

  <script src="/js/transitions.js"></script>
